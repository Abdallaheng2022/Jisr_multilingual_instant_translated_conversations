name: Build Jisr APK

# متى يعمل: عند الدفع لفرع main أو يدوياً من تبويب Actions
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) جلب الكود
      - name: Checkout
        uses: actions/checkout@v4

      # 2) تثبيت Java (مطلوب لبناء Android/Gradle)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3) تثبيت Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 4) توليد ملفات Android في مشروع مؤقت نظيف ثم نسخ مجلد android فقط
      #    (نتجنّب flutter create فوق pubspec المخصص لأنه يفشل في Flutter 3.44)
      - name: Regenerate Android project files
        run: |
          rm -rf android
          # أنشئ مشروعاً مؤقتاً باسم الحزمة الصحيح في مجلد منفصل
          TMP=$(mktemp -d)
          flutter create --platforms=android --project-name jisr \
            --org com.jisr "$TMP/jisr"
          # انسخ مجلد android المولّد فقط إلى مشروعنا
          cp -r "$TMP/jisr/android" ./android
          rm -rf "$TMP"
          echo "✅ نُسخ مجلد android من مشروع نظيف"
          grep -r "flutterEmbedding" android/app/src/main/AndroidManifest.xml || true

      # 4ب) رفع compileSdk إلى 37 (receive_sharing_intent يتطلبه)
      - name: Set compileSdk to 37
        run: |
          GRADLE=android/app/build.gradle.kts
          # استبدل أي compileSdk بقيمة 37
          if grep -q "compileSdk = flutter.compileSdkVersion" "$GRADLE"; then
            sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 37/' "$GRADLE"
          elif grep -q "compileSdk =" "$GRADLE"; then
            sed -i 's/compileSdk = [0-9]*/compileSdk = 37/' "$GRADLE"
          else
            # أضف السطر داخل android { }
            sed -i 's/android {/android {\n    compileSdk = 37/' "$GRADLE"
          fi
          echo "--- compileSdk بعد التعديل ---"
          grep "compileSdk" "$GRADLE" || true

      # 5) حقن أذونات الميكروفون/الإنترنت/الفوترة في الـ manifest المولّد
      #    (flutter create ينتج manifest أساسياً بدونها)
      - name: Inject permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 - "$MANIFEST" <<'PY'
          import sys, re
          p = sys.argv[1]
          s = open(p, encoding="utf-8").read()
          perms = (
              '    <uses-permission android:name="android.permission.INTERNET"/>\n'
              '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n'
              '    <uses-permission android:name="com.android.vending.BILLING"/>\n'
          )
          if "RECORD_AUDIO" not in s:
              s = re.sub(r"(<manifest[^>]*>\n)", r"\1" + perms, s, count=1)

          # أضف intent-filter لاستقبال الصوت المُشارَك من الواتساب
          if "SEND" not in s:
              share_filter = (
                  '\n                <intent-filter>\n'
                  '                    <action android:name="android.intent.action.SEND" />\n'
                  '                    <category android:name="android.intent.category.DEFAULT" />\n'
                  '                    <data android:mimeType="audio/*" />\n'
                  '                </intent-filter>\n'
              )
              s = re.sub(r"(</intent-filter>\n)", r"\1" + share_filter, s, count=1)

          # اجعل التطبيق يعيد استخدام النسخة المفتوحة عند المشاركة
          # Flutter يولّد singleTop افتراضياً — نستبدله بـ singleTask
          if 'launchMode="singleTop"' in s:
              s = s.replace('launchMode="singleTop"', 'launchMode="singleTask"')
          elif "launchMode" not in s:
              s = re.sub(
                  r'(<activity\s+android:name="\.MainActivity")',
                  r'\1\n            android:launchMode="singleTask"',
                  s, count=1)

          # deep link لعودة Google OAuth للتطبيق (io.jisr.app://login-callback)
          if "login-callback" not in s:
              oauth_filter = (
                  '\n                <intent-filter>\n'
                  '                    <action android:name="android.intent.action.VIEW" />\n'
                  '                    <category android:name="android.intent.category.DEFAULT" />\n'
                  '                    <category android:name="android.intent.category.BROWSABLE" />\n'
                  '                    <data android:scheme="com.jisr.app" android:host="login-callback" />\n'
                  '                </intent-filter>\n'
              )
              s = re.sub(r"(</intent-filter>\n)", r"\1" + oauth_filter, s, count=1)

          open(p, "w", encoding="utf-8").write(s)
          print("✅ أُضيفت الأذونات وintent-filters وlaunchMode")
          PY
          echo "--- الأذونات الحالية ---"
          grep "uses-permission" "$MANIFEST" || true
          echo "--- launchMode (يجب أن يكون singleTask) ---"
          grep "launchMode" "$MANIFEST" || echo "⚠️ لا launchMode!"
          echo "--- intent-filters ---"
          grep -c "intent-filter" "$MANIFEST" || true

      # 6) جلب الحزم
      - name: Get dependencies
        run: flutter pub get

      # توليد أيقونة التطبيق (بعد توليد android)
      - name: Generate app icon
        run: dart run flutter_launcher_icons || echo "icon generation skipped"

      # 7) بناء APK — المفاتيح تُحقن من GitHub Secrets (لا تظهر في الكود)
      #    أضفها في: Settings → Secrets and variables → Actions
      #    الأسماء المطلوبة: MODAL_URL · GROQ_KEY · SUPABASE_URL · SUPABASE_ANON_KEY
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL="${{ secrets.MODAL_URL }}" \
            --dart-define=GROQ_KEY="${{ secrets.GROQ_KEY }}" \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

      # 8) رفع الـ APK كأثر (Artifact) لتنزيله من صفحة التشغيل
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jisr-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
