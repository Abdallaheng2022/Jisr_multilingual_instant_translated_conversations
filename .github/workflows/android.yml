name: Build Jisr APK

# متى يعمل: عند الدفع لفرع main أو يدوياً من تبويب Actions
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) جلب الكود
      - name: Checkout
        uses: actions/checkout@v4

      # 2) تثبيت Java (مطلوب لبناء Android/Gradle)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3) تثبيت Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 4) توليد ملفات Android في مشروع مؤقت نظيف ثم نسخ مجلد android فقط
      #    (نتجنّب flutter create فوق pubspec المخصص لأنه يفشل في Flutter 3.44)
      - name: Regenerate Android project files
        run: |
          rm -rf android
          # أنشئ مشروعاً مؤقتاً باسم الحزمة الصحيح في مجلد منفصل
          TMP=$(mktemp -d)
          flutter create --platforms=android --project-name jisr \
            --org com.example "$TMP/jisr"
          # انسخ مجلد android المولّد فقط إلى مشروعنا
          cp -r "$TMP/jisr/android" ./android
          rm -rf "$TMP"
          echo "✅ نُسخ مجلد android من مشروع نظيف"
          grep -r "flutterEmbedding" android/app/src/main/AndroidManifest.xml || true

      # 4ب) رفع compileSdk إلى 36 (file_picker وبعض الحزم تتطلبه)
      - name: Set compileSdk to 36
        run: |
          GRADLE=android/app/build.gradle.kts
          # استبدل compileSdk = flutter.compileSdkVersion برقم ثابت 36
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' "$GRADLE"
          sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 36/' "$GRADLE"
          # في حال لم يوجد أيّهما، تأكد من وجود سطر compileSdk = 36
          grep -q "compileSdk = 36" "$GRADLE" || sed -i 's/compileSdk[^=]*=.*/compileSdk = 36/' "$GRADLE"
          echo "--- compileSdk بعد التعديل ---"
          grep "compileSdk" "$GRADLE" || true

      # 5) حقن أذونات الميكروفون/الإنترنت/الفوترة في الـ manifest المولّد
      #    (flutter create ينتج manifest أساسياً بدونها)
      - name: Inject permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 - "$MANIFEST" <<'PY'
          import sys, re
          p = sys.argv[1]
          s = open(p, encoding="utf-8").read()
          perms = (
              '    <uses-permission android:name="android.permission.INTERNET"/>\n'
              '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n'
              '    <uses-permission android:name="com.android.vending.BILLING"/>\n'
          )
          if "RECORD_AUDIO" not in s:
              s = s.replace("<manifest", perms and "<manifest", 1)
              # أدرج الأذونات بعد سطر <manifest ...>
              s = re.sub(r"(<manifest[^>]*>\n)", r"\1" + perms, s, count=1)
          open(p, "w", encoding="utf-8").write(s)
          print("✅ أُضيفت الأذونات")
          PY
          echo "--- الأذونات الحالية ---"
          grep "uses-permission" "$MANIFEST" || true

      # 6) جلب الحزم
      - name: Get dependencies
        run: flutter pub get

      # 7) بناء APK — المفاتيح تُحقن من GitHub Secrets (لا تظهر في الكود)
      #    أضفها في: Settings → Secrets and variables → Actions
      #    الأسماء المطلوبة: GROQ_KEY  و  MODAL_URL
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL="${{ secrets.MODAL_URL }}" \
            --dart-define=GROQ_KEY="${{ secrets.GROQ_KEY }}"

      # 8) رفع الـ APK كأثر (Artifact) لتنزيله من صفحة التشغيل
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jisr-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
