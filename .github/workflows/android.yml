name: Build Jisr APK

# متى يعمل: عند الدفع لفرع main أو يدوياً من تبويب Actions
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) جلب الكود
      - name: Checkout
        uses: actions/checkout@v4

      # 2) تثبيت Java (مطلوب لبناء Android/Gradle)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3) تثبيت Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 4) توليد ملفات Android إن كانت ناقصة
      #    (يحافظ على كل كود lib/ ويضيف مجلد android/ فقط)
      - name: Ensure Android project files
        run: |
          if [ ! -d "android" ]; then
            echo "مجلد android/ غير موجود — يولّده Flutter الآن"
            flutter create --platforms=android --project-name jisr .
          fi

      # 5) جلب الحزم
      - name: Get dependencies
        run: flutter pub get

      # 6) بناء APK
      #    غيّر API_BASE_URL لعنوان سيرفرك الوسيط
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://your-server.example.com

      # 7) رفع الـ APK كأثر (Artifact) لتنزيله من صفحة التشغيل
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jisr-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
