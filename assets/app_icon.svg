<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A2530"/>
      <stop offset="1" stop-color="#0E1116"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EC8C4"/>
      <stop offset="1" stop-color="#3A8F8C"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2A65A"/>
      <stop offset="1" stop-color="#E0863A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F2A65A" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#F2A65A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- خلفية -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- توهّج خلف النقطة -->
  <circle cx="256" cy="205" r="115" fill="url(#glow)"/>

  <!-- قوس الجسر -->
  <path d="M 155 320 Q 256 130 357 320" fill="none" stroke="url(#teal)" stroke-width="30" stroke-linecap="round"/>

  <!-- سطح الجسر -->
  <rect x="150" y="305" width="212" height="22" rx="11" fill="url(#teal)"/>

  <!-- دعامتان -->
  <rect x="202" y="235" width="15" height="90" rx="7" fill="#3A8F8C" opacity="0.55"/>
  <rect x="295" y="235" width="15" height="90" rx="7" fill="#3A8F8C" opacity="0.55"/>

  <!-- حلقات التوهّج -->
  <circle cx="256" cy="205" r="58" fill="none" stroke="#F2A65A" stroke-width="4" opacity="0.2"/>
  <circle cx="256" cy="205" r="44" fill="none" stroke="#F2A65A" stroke-width="5" opacity="0.42"/>

  <!-- نقطة الاتصال المضيئة -->
  <circle cx="256" cy="205" r="30" fill="url(#amber)"/>
</svg>
