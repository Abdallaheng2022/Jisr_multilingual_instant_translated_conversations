name: jisr
description: جسر — ترجمة صوتية فورية بالاستنساخ الصوتي
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2

  # Audio recording + playback
  record: ^6.0.0
  audioplayers: ^6.1.0

  # Local persistence (free-message counter, subscription cache, settings)
  shared_preferences: ^2.3.2

  # In-app purchases (Google Play billing)
  in_app_purchase: ^3.2.0

  # Supabase — auth, database (Postgres), storage, realtime
  supabase_flutter: ^2.8.0
  google_sign_in: ^6.2.1

  # Permissions (microphone)
  permission_handler: ^11.3.1

  # Utilities
  path_provider: ^2.1.4
  uuid: ^4.5.1

  # Fonts / icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
